name: Deploy to Oracle VM (Zero Downtime + Rollback)

on:
  push:
    branches:
      - main

env:
  APP_DIR: /var/www/pankh
  RELEASES_DIR: /var/www/pankh/releases
  CURRENT_LINK: /var/www/pankh/current

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Create deployment archive
        run: |
          tar -czf app.tar.gz .

      - name: 🚀 Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar.gz"
          target: "/tmp"

      - name: ⚙️ Deploy with zero downtime + rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP
            PREVIOUS_RELEASE=$(readlink -f $CURRENT_LINK || echo "")

            echo "📁 Creating new release: $NEW_RELEASE"
            sudo mkdir -p $NEW_RELEASE

            echo "📦 Extracting files"
            sudo tar -xzf /tmp/app.tar.gz -C $NEW_RELEASE

            echo "🔐 Setting permissions"
            sudo chown -R www-data:www-data $NEW_RELEASE

            echo "🔗 Switching symlink (zero downtime)"
            sudo ln -sfn $NEW_RELEASE $CURRENT_LINK

            echo "🔁 Reloading NGINX"
            sudo systemctl reload nginx

            echo "⏳ Waiting for app to be ready..."
            sleep 3

            echo "🩺 Running health check"
            if ! curl -f http://localhost > /dev/null; then
              echo "❌ Health check failed! Rolling back..."

              if [ -n "$PREVIOUS_RELEASE" ]; then
                sudo ln -sfn $PREVIOUS_RELEASE $CURRENT_LINK
                sudo systemctl reload nginx
                echo "✅ Rolled back to previous release"
              else
                echo "⚠️ No previous release found"
              fi

              exit 1
            fi

            echo "🧹 Cleaning up old releases (keeping last 5)"
            cd $RELEASES_DIR
            ls -dt */ | tail -n +6 | xargs -r sudo rm -rf

            echo "🗑 Removing temp archive"
            rm -f /tmp/app.tar.gz

            echo "✅ Deployment successful!"