name: Deploy Flutter Web (Client)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v5

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3️⃣ Disable analytics
      - run: flutter config --no-analytics

      # 4️⃣ Cache pub
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5️⃣ Install deps
      - run: flutter pub get

      # 6️⃣ Build
      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --dart-define=PANKH_API_BASE_URL=https://api.pankh.email/api

      # 7️⃣ Generate release ID (CORRECT PLACE)
      - name: Generate release ID
        run: echo "RELEASE=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # 8️⃣ Prepare release folder
      - name: Prepare release folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/pankh/releases/${{ env.RELEASE }}

      # 9️⃣ Upload build
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/pankh/releases/${{ env.RELEASE }}"
          strip_components: 2

      # 🔟 Activate release (safe switch)
      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            RELEASE=/var/www/pankh/releases/${{ env.RELEASE }}

            # Validate build
            if [ ! -f "$RELEASE/index.html" ]; then
              echo "❌ index.html missing, aborting"
              exit 1
            fi

            # Save previous
            PREVIOUS=$(readlink -f /var/www/pankh/current || echo "")

            # Switch (atomic)
            sudo ln -sfn $RELEASE /var/www/pankh/current

            # Permissions
            sudo chown -R www-data:www-data /var/www/pankh
            sudo chmod -R 755 /var/www/pankh

            # Reload nginx
            sudo nginx -t
            sudo systemctl reload nginx

            # Save previous for rollback (temp file)
            echo $PREVIOUS > /tmp/pankh_previous_release

      # 🔁 Rollback on failure
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ -f /tmp/pankh_previous_release ]; then
              PREVIOUS=$(cat /tmp/pankh_previous_release)
              sudo ln -sfn $PREVIOUS /var/www/pankh/current
              sudo systemctl reload nginx
              echo "✅ Rollback done"
            else
              echo "⚠️ No previous release found"
            fi

      # 🧹 Cleanup (safe)
      - name: Cleanup old releases
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo ls -dt /var/www/pankh/releases/* | tail -n +6 | xargs -r sudo rm -rf