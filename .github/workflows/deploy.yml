name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0

      - run: |
          flutter pub get
          flutter build web \
            --dart-define=PANKH_API_BASE_URL=https://api.pankh.email/api

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        run: |
          rsync -avz -e "ssh -i ~/.ssh/key" \
          build/web/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/pankh/
